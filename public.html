<!DOCTYPE html>
<html lang="th">
<head>  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Public Schedule - Health Assistant OS</title>

  <script>
    // Vercel bridge: emulate google.script.run by calling /api/gas
    (function () {
      if (window.google && window.google.script && window.google.script.run) return;
      function makeRunner(successHandler, failureHandler) {
        return new Proxy({}, { get: function (_target, prop) {
          if (prop === 'withSuccessHandler') return function (cb) { return makeRunner(cb, failureHandler); };
          if (prop === 'withFailureHandler') return function (cb) { return makeRunner(successHandler, cb); };
          if (prop === 'toString') return function () { return '[google.script.run Vercel Bridge]'; };
          return function () {
            var args = Array.prototype.slice.call(arguments);
            fetch('/api/gas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fn: String(prop), args: args }) })
            .then(function (response) { return response.text().then(function (text) { var data; try { data = text ? JSON.parse(text) : {}; } catch (err) { throw new Error(text || response.statusText || 'Invalid API response'); } if (!response.ok || data.__bridgeError) throw new Error(data.message || 'API request failed'); return data; }); })
            .then(function (data) { if (typeof successHandler === 'function') successHandler(data); })
            .catch(function (err) { if (typeof failureHandler === 'function') failureHandler(err); else { console.error('[Vercel GAS Bridge]', err); if (window.Swal) Swal.fire('เชื่อมต่อระบบไม่สำเร็จ', err.message || String(err), 'error'); } });
          };
        }});
      }
      window.google = window.google || {}; window.google.script = window.google.script || {}; window.google.script.run = makeRunner(null, null);
    })();
  </script>

  
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.1/sweetalert2.all.min.js"></script>
  
  <style>
    body { background-color: #f0f4f8; font-family: 'Prompt', sans-serif; color: #334155; }
    .card { border: none; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); overflow: hidden; max-width: 600px; margin: 40px auto; }
    .card-header { background: linear-gradient(135deg, #0284c7, #0ea5e9); color: white; padding: 20px; }
    .info-label { font-size: 0.85em; font-weight: bold; color: #64748b; margin-bottom: 4px; display: block; }
    .info-value { font-size: 1.05em; color: #1e293b; margin-bottom: 20px; white-space: pre-wrap; }
    .status-badge { font-size: 0.8em; padding: 5px 12px; border-radius: 20px; }


    /* UI Refresh Foundation v1 - Public Page */
    :root { --ha-primary:#0284c7; --ha-secondary:#10b981; --ha-ink:#0f172a; --ha-muted:#64748b; --ha-line:#e2e8f0; }
    body { background: radial-gradient(circle at top left, rgba(14,165,233,.16), transparent 34%), linear-gradient(180deg,#f8fbff 0%,#eef6fb 100%); min-height:100vh; }
    .public-shell { padding:28px 0; }
    .card { max-width:760px; border:1px solid rgba(226,232,240,.9); border-radius:26px; box-shadow:0 24px 70px rgba(15,23,42,.10); }
    .card-header { background:linear-gradient(135deg,var(--ha-primary),#0ea5e9 58%,var(--ha-secondary)); padding:26px; }
    .public-mark { width:58px; height:58px; border-radius:20px; margin:0 auto 12px; display:grid; place-items:center; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.28); font-size:1.6rem; }
    .info-label { color:var(--ha-muted); } .info-value { color:var(--ha-ink); }
    .status-badge { background:#e0f2fe!important; color:#0369a1!important; border:1px solid #bae6fd; }
    .public-footer-note { color:var(--ha-muted); font-size:.78rem; }
    @media (max-width:768px){ .card{margin:18px 8px;border-radius:22px;} .card-body{padding:20px!important;} }
    @media print{ body{background:#fff!important;} .card{box-shadow:none!important;border:0!important;margin:0!important;max-width:100%!important;} .card-footer,.btn{display:none!important;} }

  </style>
</head>
<body>

  <div class="container public-shell">
    <div class="card" id="scheduleCard">
      <div class="card-header text-center">
        <div class="public-mark"><i class="bi bi-calendar-check"></i></div>
        <h4 class="fw-bold mb-1">รายละเอียดการปฏิบัติงาน</h4>
        <small class="opacity-75">Health Assistant OS (สสจ.นครนายก)</small>
      </div>
      <div class="card-body p-4" id="contentBody">
        <div class="text-center py-5" id="loadingDiv">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">กำลังโหลดข้อมูล...</p>
        </div>
        
        <div id="dataDiv" style="display: none;">
          <div class="mb-3 d-flex justify-content-between align-items-center">
             <h5 id="psEventName" class="fw-bold text-primary mb-0"></h5>
             <span id="psWorkStatus" class="status-badge bg-info text-white"></span>
          </div>
          
          <hr class="text-muted opacity-25">

          <span class="info-label"><i class="bi bi-clock"></i> วัน-เวลา</span>
          <div class="info-value" id="psStartTime"></div>

          <span class="info-label"><i class="bi bi-geo-alt"></i> สถานที่</span>
          <div class="info-value" id="psLocation"></div>

          <span class="info-label"><i class="bi bi-card-text"></i> รายละเอียด / สิ่งที่ต้องทำ</span>
          <div class="info-value bg-light p-3 rounded border" id="psDetails"></div>

          <span class="info-label"><i class="bi bi-camera-video"></i> ลิงก์การประชุม (ออนไลน์)</span>
          <div class="info-value" id="psLink"></div>

          <span class="info-label"><i class="bi bi-paperclip"></i> ไฟล์เอกสารแนบ</span>
          <div class="info-value" id="psFile"></div>

          <span class="info-label"><i class="bi bi-shield-check"></i> สถานะลิงก์สาธารณะ</span>
          <div class="info-value small text-muted" id="psExpiry"></div>
        </div>
      </div>
      
      <div class="card-footer bg-white border-top p-3 text-center" id="footerDiv" style="display: none;">
        <button class="btn btn-outline-primary btn-sm mx-1 fw-bold" onclick="printPublicSchedule()"><i class="bi bi-printer"></i> พิมพ์เอกสาร</button>
        <button class="btn btn-outline-success btn-sm mx-1 fw-bold" onclick="copyData()"><i class="bi bi-clipboard"></i> คัดลอกข้อความ</button>
      </div>
    <div class="text-center public-footer-note mb-3">สร้างจาก Health Assistant OS • สำนักงานสาธารณสุขจังหวัดนครนายก</div>
  </div>

  <script>
    window.onload = function() {
      // รับ publicId จาก template ก่อน ถ้าไม่มีค่อยอ่านจาก URL Parameter
      const templatePublicId = ''; 
      const urlParams = new URLSearchParams(window.location.search);
      const publicId = templatePublicId && templatePublicId !== 'undefined' ? templatePublicId : urlParams.get('publicId');

      if (!publicId) {
        document.getElementById('loadingDiv').innerHTML = '<div class="text-danger fw-bold"><i class="bi bi-exclamation-triangle"></i> ไม่พบรหัสอ้างอิงข้อมูล (Invalid Link)</div>';
        return;
      }

      // เรียกใช้งาน getPublicSchedule ฝั่งเซิร์ฟเวอร์
      google.script.run
      .withFailureHandler(function(err) {
        document.getElementById('loadingDiv').style.display = 'block';
        document.getElementById('loadingDiv').innerHTML = '<div class="text-danger fw-bold"><i class="bi bi-exclamation-triangle"></i> โหลดข้อมูลไม่สำเร็จ: ' + (err && err.message ? err.message : err) + '</div>';
      })
      .withSuccessHandler(function(res) {
        document.getElementById('loadingDiv').style.display = 'none';
        
        if (res.success) {
          const data = res.data;
          document.getElementById('dataDiv').style.display = 'block';
          document.getElementById('footerDiv').style.display = 'block';

          document.getElementById('psEventName').innerText = data.eventName || '-';
          document.getElementById('psWorkStatus').innerText = data.workStatus || 'ปกติ';
          document.getElementById('psStartTime').innerText = data.startTime || '-';
          document.getElementById('psLocation').innerText = data.location || '-';
          document.getElementById('psDetails').innerText = data.details || '-';
          document.getElementById('psExpiry').innerText = data.expiresAt ? ('ลิงก์นี้หมดอายุ: ' + data.expiresAt) : 'ลิงก์นี้ไม่มีวันหมดอายุ';

          if (data.meetingLink) {
            document.getElementById('psLink').innerHTML = `<a href="${data.meetingLink}" target="_blank" class="text-break">${data.meetingLink}</a>`;
          } else {
            document.getElementById('psLink').innerText = '-';
          }

          if (data.fileUrl) {
            document.getElementById('psFile').innerHTML = `<a href="${data.fileUrl}" target="_blank" class="btn btn-sm btn-light border text-primary"><i class="bi bi-file-earmark-text"></i> คลิกเพื่อเปิดไฟล์แนบ</a>`;
          } else {
            document.getElementById('psFile').innerText = 'ไม่มีเอกสารแนบ';
          }
          
        } else {
          document.getElementById('loadingDiv').style.display = 'block';
          document.getElementById('loadingDiv').innerHTML = `<div class="text-danger fw-bold"><i class="bi bi-exclamation-triangle"></i> ${res.message}</div>`;
        }
      }).getPublicSchedule(publicId);
    };

    function printPublicSchedule() {
      const card = document.getElementById('scheduleCard');
      if (!card) return window.print();

      const oldStyle = document.getElementById('publicPrintStyle');
      if (oldStyle) oldStyle.remove();

      const style = document.createElement('style');
      style.id = 'publicPrintStyle';
      style.innerHTML = `
        @media print {
          body { background: #ffffff !important; }
          body * { visibility: hidden !important; }
          #scheduleCard, #scheduleCard * { visibility: visible !important; }
          #scheduleCard {
            position: absolute !important;
            left: 0 !important;
            top: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
            box-shadow: none !important;
          }
          .card-footer { display: none !important; }
          @page { size: A4; margin: 14mm; }
        }
      `;
      document.head.appendChild(style);

      const cleanup = () => {
        const css = document.getElementById('publicPrintStyle');
        if (css) css.remove();
        window.removeEventListener('afterprint', cleanup);
      };
      window.addEventListener('afterprint', cleanup);

      setTimeout(() => {
        window.focus();
        window.print();
        setTimeout(cleanup, 1500);
      }, 150);
    }

    function copyData() {
      const textToShare = `
🗓 ${document.getElementById('psEventName').innerText}
⏰ เวลา: ${document.getElementById('psStartTime').innerText}
📍 สถานที่: ${document.getElementById('psLocation').innerText}
📌 สถานะ: ${document.getElementById('psWorkStatus').innerText}
🔗 ลิงก์รายละเอียด: ${window.location.href}
      `.trim();
      navigator.clipboard.writeText(textToShare).then(() => {
        Swal.fire({icon: 'success', title: 'คัดลอกข้อความแล้ว', text: 'คุณสามารถนำไปวางในแชทได้เลย', timer: 1500, showConfirmButton: false});
      }).catch(() => {
        Swal.fire('คัดลอกไม่สำเร็จ', textToShare, 'info');
      });
    }
  </script>
</body>
</html>
